name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Prisma 客户端必须在 build 之前生成，否则 packages/db 的 tsc 撞 InputJsonValue 类型缺失。
      - name: Prisma generate
        run: npm run db:generate

      - name: Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Stylelint
        run: npm run stylelint

      - name: Build
        run: npm run build

  # 构建生产镜像，捕获 Dockerfile 回归（依赖缺失、prisma generate 顺序、基础镜像、CMD 路径等）。
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: aigc-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: false
          tags: aigc-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: aigc-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
