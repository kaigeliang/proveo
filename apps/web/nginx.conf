server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://api:5001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /generated/ {
    proxy_pass http://api:5001/generated/;
  }

  location /uploads/ {
    proxy_pass http://api:5001/uploads/;
  }

  location /objects/ {
    proxy_pass http://api:5001/objects/;
  }

  location /reference-videos/ {
    proxy_pass http://api:5001/reference-videos/;
  }
}
